<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nolimi - Connexion</title>
    <link rel="stylesheet" href="../assets/brand/tokens.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
        .centre {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .form-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }
        .form-login label {
            font-size: 0.9rem;
            color: var(--nolimi-text);
        }
        .form-login input {
            padding: 0.6rem 0.75rem;
            font-size: 1rem;
            border: 1px solid var(--nolimi-border);
            border-radius: 6px;
        }
        .form-login input:focus {
            outline: none;
            border-color: var(--nolimi-accent);
        }
        .form-login button {
            margin-top: 0.5rem;
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            background: var(--nolimi-accent);
            color: #fff;
            border: none;
            border-radius: 6px;
        }
        .form-login button:hover { background: var(--nolimi-accent-hover); }
        .form-login button:disabled { opacity: 0.6; cursor: wait; }
        .error-msg {
            color: var(--nolimi-danger);
            font-size: 0.9rem;
            margin-top: 0.25rem;
            min-height: 1.4em;
        }
        .btn-retour {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            color: var(--nolimi-text);
            text-decoration: none;
            border: 1px solid var(--nolimi-border);
            border-radius: 6px;
            background: var(--nolimi-surface);
        }
        .btn-retour:hover { background: var(--nolimi-bg); }
        .login-legal {
            margin-top: 0.85rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.5rem 1rem;
            font-size: 0.72rem;
            line-height: 1.5;
            color: var(--nolimi-text-muted);
            text-align: center;
        }
        .login-copyright {
            flex-shrink: 0;
        }
        .login-legal__accept {
            margin: 0;
        }
        .login-legal a {
            color: var(--nolimi-accent);
            text-decoration: none;
        }
        .login-legal a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../saas/config/supabase.config.js"></script>
    <script src="../saas/lib/auth.js"></script>
</head>
<body>
    <a href="../website/index.html" class="btn-retour">← Retour</a>
    <main class="centre">
        <form class="form-login" id="form-login">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required autocomplete="email">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <div id="error-msg" class="error-msg" aria-live="polite"></div>
            <button type="submit" id="btn-submit">Connexion</button>
            <p class="login-legal">
                <span class="login-copyright">© 2026 Nolimi. Tous droits réservés.</span>
                <span class="login-legal__accept">En vous connectant, vous acceptez nos <a href="../website/mentions-legales.html">Mentions Légales &amp; CGU</a>.</span>
            </p>
        </form>
    </main>
    <script>
        (function () {
            var form = document.getElementById('form-login');
            var errEl = document.getElementById('error-msg');
            var submitBtn = document.getElementById('btn-submit');

            if (typeof NolimiAuth !== 'undefined' && NolimiAuth.redirectIfAlreadyLoggedIn) {
                NolimiAuth.redirectIfAlreadyLoggedIn();
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var email = document.getElementById('email').value.trim();
                var password = document.getElementById('password').value;
                errEl.textContent = '';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Connexion...';

                if (typeof NolimiAuth === 'undefined' || !NolimiAuth.signInWithPassword) {
                    errEl.textContent = 'Service de connexion indisponible.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Connexion';
                    return;
                }

                NolimiAuth.signInWithPassword(email, password).then(function (result) {
                    if (result.error) {
                        errEl.textContent = result.error.message;
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Connexion';
                        return;
                    }
                    window.location.replace(NolimiAuth.getAppUrl());
                }).catch(function () {
                    errEl.textContent = 'Erreur réseau. Réessayez.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Connexion';
                });
            });
        })();
    </script>
</body>
</html>
