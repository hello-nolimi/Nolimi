<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nolimi - Atelier Bouteille</title>
    
    <link rel="stylesheet" href="layout/structure.css">
    <link rel="stylesheet" href="style/theme.css">
    
    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/EXRLoader.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <section id="Page-menu" class="hidden">
        <div class="menu-split-container">
            <div class="menu-col-left">
                <div class="menu-left-panel">
                    <h1 class="menu-title">Nolimi</h1>
                    <button id="btn-new-project" class="menu-big-btn"><span>+</span> NOUVEAU</button>
                    <button id="btn-open-project" class="menu-big-btn secondary"><span>📂</span> OUVRIR</button>
                    <input type="file" id="file-loader" class="hidden-file">
                </div>
            </div>
            <div class="menu-col-right"></div>
        </div>
    </section>

    <section id="Page-Bouteille">
        
        <aside id="Panel-gauche">
            <!-- Sidebar : icônes cliquables pour afficher le contenu dans l'Inspector -->
            <div id="sidebar" class="panel-logo-col">
                <div class="panel-logo panel-col-tab active" id="panel-tab-sections" title="Section" role="button" tabindex="0">S</div>
                <div class="panel-logo panel-col-tab" id="panel-tab-gravure" title="Gravure" role="button" tabindex="0">G</div>
                <div class="panel-logo panel-col-tab" id="panel-tab-information" title="Plan" role="button" tabindex="0">P</div>
                <div class="panel-logo panel-col-tab" id="panel-tab-rendu" title="Rendu" role="button" tabindex="0">R</div>
                <div class="panel-logo panel-col-tab" id="panel-tab-calcule" title="Calcule" role="button" tabindex="0">C</div>
            </div>
            <!-- Inspector : zone où s'affiche le contenu (pages pilotées par le Brand Header) -->
            <div id="inspector" class="panel-right">
                <!-- Row fixe avec les 3 icônes (Sections / Piqûre / Bague) -->
                <div id="brand-header" class="panel-icons-bar">
                    <span class="panel-bar-icon" id="panel-bar-tab-sections" title="Sections actuelles">🔧</span>
                    <span class="panel-bar-icon" id="panel-bar-tab-piqure" title="Sections piqûre">⚙️</span>
                    <span class="panel-bar-icon" id="panel-bar-tab-bague" title="Sections bague">⭕</span>
                    <span class="panel-bar-icon" id="panel-bar-tab-interieur" title="Intérieur bouteille">🫙</span>
                </div>
                <!-- Container scrollable pour tout le reste de l'inspector -->
                <div id="inspector-scroll" class="inspector-scroll">
                    <div class="panel-sections-area" id="panel-sections-area">
                        <div class="panel-content" id="panel-content-sections">
                            <!-- Rempli par UIInspector.renderSections() -->
                        </div><!-- #panel-content-sections -->
                        <div class="panel-content panel-piqure-content hidden" id="panel-content-piqure">
                            <!-- Rempli par UIInspector.renderSections() -->
                        </div><!-- #panel-content-piqure -->
                        <div class="panel-content panel-bague-content hidden" id="panel-content-bague">
                            <!-- Rempli par UIInspector.renderSections() -->
                        </div><!-- #panel-content-bague -->
                        <div class="panel-content panel-interieur-content hidden" id="panel-content-interieur">
                            <!-- Rempli par InterieurFeature.render() -->
                        </div><!-- #panel-content-interieur -->
                    </div><!-- #panel-sections-area -->
                    <div class="panel-content panel-gravure-content hidden" id="panel-content-gravure">
                    <button type="button" class="btn-add-gravure" id="btn-add-engraving">Ajouter une gravure</button>
                    <div id="engravings-container"></div>
                    </div>
                    <div class="panel-content panel-calcule-content hidden" id="panel-content-calcule">
                        <!-- Rempli par CalculeVolumeFeature.renderPanel() -->
                    </div>
                    <div class="panel-content panel-information-content hidden" id="panel-content-information">
                    <div class="setting-card">
                        <button class="accordion main-accordion">Format</button>
                        <div class="panel-controls">
                            <div class="control-group">
                                <div class="label-row"><label>Format feuille</label></div>
                                <select id="paper-format-select">
                                    <option value="A4_P">A4 Portrait</option>
                                    <option value="A4_L">A4 Paysage</option>
                                    <option value="A3_P">A3 Portrait</option>
                                    <option value="A3_L">A3 Paysage</option>
                                    <option value="A2_P" selected>A2 Portrait</option>
                                    <option value="A2_L">A2 Paysage</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <div class="label-row"><label>Échelle</label></div>
                                <select id="drawing-scale-select">
                                    <option value="1:1" selected>1:1</option>
                                    <option value="1:2">1:2</option>
                                    <option value="1:5">1:5</option>
                                    <option value="2:1">2:1</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="setting-card">
                        <button class="accordion main-accordion">Vues</button>
                        <div class="panel-controls">
                            <div class="control-group">
                                <label><input type="checkbox" id="cb-vue-dessous"> Vue du dessous</label>
                            </div>
                        </div>
                    </div>
                    <div class="setting-card">
                        <button class="accordion main-accordion">Cartouche</button>
                        <div class="panel-controls">
                            <div class="control-group">
                                <div class="label-row"><label>N° plan</label></div>
                                <input type="text" id="cartouche-plan-number" placeholder="—">
                            </div>
                            <div class="control-group">
                                <div class="label-row"><label>Date</label></div>
                                <input type="text" id="cartouche-date" placeholder="—">
                            </div>
                            <div class="control-group">
                                <div class="label-row"><label>Dessinateur (DESSI.)</label></div>
                                <input type="text" id="cartouche-drafter" placeholder="—">
                            </div>
                            <div class="control-group">
                                <div class="label-row"><label>Vérificateur (VERIF.)</label></div>
                                <input type="text" id="cartouche-checker" placeholder="—">
                            </div>
                            <div class="control-group">
                                <div class="label-row"><label>Titre</label></div>
                                <input type="text" id="cartouche-title" placeholder="—">
                            </div>
                            <div class="control-group">
                                <div class="label-row"><label>Indice</label></div>
                                <input type="text" id="cartouche-index" placeholder="—">
                            </div>
                        </div>
                    </div>
                    </div>
                    <div class="panel-content panel-rendu-content hidden" id="panel-content-rendu">
                        <div class="setting-card">
                            <button type="button" class="accordion main-accordion" id="render-mode-title" style="justify-content: space-between;">
                                <span>Mode rendu</span>
                                <span class="input-wrapper"><input type="checkbox" id="render-mode-toggle"></span>
                            </button>
                        </div>
                        <div class="setting-card">
                            <button class="accordion main-accordion">Matériaux</button>
                            <div class="panel-controls">
                                <div class="control-group">
                                    <label>
                                        <input type="radio" name="render-material" id="render-material-glass" value="glass" checked>
                                        verre
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="setting-card" id="render-scene-card">
                            <button class="accordion main-accordion">Scène</button>
                            <div class="panel-controls">
                                <div class="control-group">
                                    <label>
                                        <input type="radio" name="render-scene" id="render-scene-base" value="base" checked>
                                        Scène 0
                                    </label>
                                </div>
                                <div class="control-group">
                                    <label>
                                        <input type="radio" name="render-scene" id="render-scene-1" value="scene1" disabled>
                                        Scène 1
                                    </label>
                                </div>
                                <div class="control-group">
                                    <label>
                                        <input type="radio" name="render-scene" id="render-scene-2" value="scene2" disabled>
                                        Scène 2
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="setting-card" id="render-label-card">
                            <button class="accordion main-accordion">Etiquettes</button>
                            <div class="panel-controls">
                                <div class="control-group">
                                    <div class="label-row"><label for="render-label-image">Image PNG</label></div>
                                    <input type="file" id="render-label-image" accept="image/png">
                                </div>
                                <div class="control-group">
                                    <div class="label-row"><label>Etiquettes</label></div>
                                    <div id="render-label-list"></div>
                                </div>
                                <div class="control-group">
                                    <div class="label-row">
                                        <label for="render-label-height">Hauteur</label>
                                        <div class="input-wrapper">
                                            <input type="number" id="render-label-height-number" min="-120" max="220" step="1" value="40">
                                            <span class="unit">mm</span>
                                        </div>
                                    </div>
                                    <input type="range" id="render-label-height" min="-120" max="220" step="1" value="40">
                                </div>
                                <div class="control-group">
                                    <div class="label-row">
                                        <label for="render-label-size">Taille</label>
                                        <div class="input-wrapper">
                                            <input type="number" id="render-label-size-number" min="20" max="300" step="1" value="100">
                                            <span class="unit">%</span>
                                        </div>
                                    </div>
                                    <input type="range" id="render-label-size" min="20" max="300" step="1" value="100">
                                </div>
                                <div class="control-group">
                                    <div class="label-row">
                                        <label for="render-label-rotation">Rotation</label>
                                        <div class="input-wrapper">
                                            <input type="number" id="render-label-rotation-number" min="-180" max="180" step="1" value="0">
                                            <span class="unit">°</span>
                                        </div>
                                    </div>
                                    <input type="range" id="render-label-rotation" min="-180" max="180" step="1" value="0">
                                </div>
                                <div class="control-group">
                                    <div class="label-row">
                                        <label><input type="checkbox" id="render-label-flip-x"> Inverser horizontalement</label>
                                    </div>
                                    <div class="label-row">
                                        <label><input type="checkbox" id="render-label-flip-y"> Inverser verticalement</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div><!-- #inspector-scroll -->
            </div><!-- #inspector -->
        </aside>

        <div id="right-column">
            <!-- Topbar : Fichier, Affichage, choix de vue 3D/2D/Outillage -->
            <div id="topbar" class="panel-haut-container">
                <div class="panel-haut-bar">
                    <div class="dropdown">
                        <button id="btn-fichier-menu" class="btn-fichier" type="button">Fichier</button>
                        <div id="fichier-dropdown" class="dropdown-content dropdown-right hidden">
                            <button id="btn-open-workspace">Ouvrir</button>
                            <button id="btn-save">Enregistrer</button>
                            <button id="btn-save-as">Enregistrer sous...</button>
                            <button id="btn-export-3d">Exporter 3D</button>
                            <button id="btn-export-2d">Exporter 2D</button>
                            <hr style="border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 5px 0;">
                            <button id="btn-back-menu">Retour au site web</button>
                        </div>
                    </div>
                    <div class="dropdown">
                        <button id="btn-affichage-menu" class="btn-fichier" type="button">Affichage</button>
                        <div id="affichage-dropdown" class="dropdown-content dropdown-right hidden">
                            <label style="padding:8px 12px; font-size:0.8rem;">
                                <span>Axes (3 traits)</span>
                                <input type="checkbox" id="display-axes-toggle" checked>
                            </label>
                            <label style="padding:8px 12px; font-size:0.8rem;">
                                <span>Grille de référence</span>
                                <input type="checkbox" id="display-grid-toggle" checked>
                            </label>
                            <label style="padding:8px 12px; font-size:0.8rem;">
                                <span>Ronds des sections</span>
                                <input type="checkbox" id="display-rings-toggle" checked>
                            </label>
                            <label style="padding:8px 12px; font-size:0.8rem;">
                                <span>Joint de moule</span>
                                <input type="checkbox" id="display-mold-joint-toggle" checked>
                            </label>
                        </div>
                    </div>
                    <button id="btn-undo" class="btn-fichier" type="button" title="Annuler">&lt;</button>
                    <button id="btn-redo" class="btn-fichier" type="button" title="Rétablir">&gt;</button>
                </div>
                <div class="panel-haut-bar panel-haut-vues">
                    <div class="view-switcher">
                        <button id="btn-view-3d" class="active">3D</button>
                        <button id="btn-view-2d">2D</button>
                    </div>
                </div>
            </div>

            <!-- Viewport : zone principale 3D / 2D -->
            <div id="viewport" class="workspace-content">
                <main id="viewport-3d"></main>
                <main id="viewport-2d" class="hidden"><canvas id="canvas-2d"></canvas></main>
            </div>

        </div>
    </section>

    <script src="store/state.js"></script>
    <script src="store/validator.js"></script>
    <script src="features/rattachement/sliderLimits.js"></script>
    <script src="features/profile/rules.js"></script>
    <script src="features/profile/math.js"></script>
    <script src="features/sections/math.js"></script>
    <script src="features/sections/rules.js"></script>
    <script src="features/sections/state.js"></script>
    <script src="features/sections/bloc.js"></script>
    <script src="features/sections/events.js"></script>
    <script src="features/render/rules.js"></script>
    <script src="features/render/math.js"></script>
    <script src="features/render/function.js"></script>
    <script src="features/rattachement/rules.js"></script>
    <script src="features/rattachement/state.js"></script>
    <script src="features/rattachement/bloc.js"></script>
    <script src="features/rattachement/events.js"></script>
    <script src="features/rattachement/math.js"></script>
    <script src="features/rattachement/function.js"></script>
    <script src="features/profile/function.js"></script>
    <script src="features/3d/data.js"></script>
    <script src="features/calcule/math.js"></script>
    <script src="features/calcule/function.js"></script>
    <script src="features/Interieur/function.js"></script>
    <script src="features/Interieur/math.js"></script>
    <script src="canvas/3d/rules.js"></script>
    <script src="canvas/3d/sceneSetup.js"></script>
    <script src="canvas/3d/materials.js"></script>
    <script src="canvas/3d/bottleMesh.js"></script>
    <script src="canvas/3d/bottleView.js"></script>
    <script src="canvas/3d/viewer.js"></script>
    <script src="features/2d/rules.js"></script>
    <script src="features/2d/math.js"></script>
    <script src="features/2d/state.js"></script>
    <script src="features/2d/events.js"></script>
    <script src="features/2d/paper.js"></script>
    <script src="features/2d/views.js"></script>
    <script src="features/2d/cartouche.js"></script>
    <script src="features/2d/cotation.js"></script>
    <script src="features/2d/data.js"></script>
    <script src="features/2d/function.js"></script>
    <script src="canvas/2d/renderPrimitives.js"></script>
    <script src="canvas/2d/interactions.js"></script>
    <script src="canvas/2d/viewer2d.js"></script>
    <script src="features/sections/function.js"></script>
    <script src="shared/navigation/rules.js"></script>
    <script src="shared/navigation/state.js"></script>
    <script src="shared/navigation/events.js"></script>
    <script src="shared/navigation/function.js"></script>
    <script src="shared/topbar/function.js"></script>
    <script src="shared/display/function.js"></script>
    <script src="shared/history/function.js"></script>
    <script src="layout/ui-controls.js"></script>
    <script src="layout/function.js"></script>
    <script src="store/storage.js"></script>
    <script src="features/export/rules.js"></script>
    <script src="features/export/math.js"></script>
    <script src="features/export/state.js"></script>
    <script src="features/export/events.js"></script>
    <script src="features/export/function.js"></script>
    <script src="features/gravure/rules.js"></script>
    <script src="features/gravure/math.js"></script>
    <script src="features/gravure/state.js"></script>
    <script src="features/gravure/bloc.js"></script>
    <script src="features/gravure/events.js"></script>
    <script src="features/gravure/function.js"></script>
    <script src="app/main.js"></script>
</body>
</html>
